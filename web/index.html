<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0e0f13" />
    <meta name="description" content="Vibe Forge — generate grounded app ideas and build-ready specs for your coding assistant. Bring your own model: Claude, GPT, Gemini, Grok, open-weight and local models." />
    <title>Vibe Forge — App Idea &amp; Spec Studio</title>

    <!-- Canonical + social cards. __SITE_ORIGIN__ is replaced at build time by the
         live deploy URL (Netlify's $URL), falling back to the production domain. -->
    <link rel="canonical" href="__SITE_ORIGIN__/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, iMessage, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vibe Forge" />
    <meta property="og:title" content="Vibe Forge — App Idea &amp; Spec Studio" />
    <meta property="og:description" content="Generate genuinely useful, web-grounded app ideas with your own AI model, then forge a complete build-ready spec for Claude Code, Cursor, or any coding assistant. Bring your own key — nothing leaves your browser." />
    <meta property="og:url" content="__SITE_ORIGIN__/" />
    <meta property="og:image" content="__SITE_ORIGIN__/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="Vibe Forge — from a spark of an idea to a build-ready spec. Works with Claude, GPT, Gemini, Grok, OpenRouter, Ollama and LM Studio." />

    <!-- Twitter / X large-image card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vibe Forge — App Idea &amp; Spec Studio" />
    <meta name="twitter:description" content="Generate genuinely useful, web-grounded app ideas with your own AI model, then forge a complete build-ready spec for Claude Code, Cursor, or any coding assistant." />
    <meta name="twitter:image" content="__SITE_ORIGIN__/og.png" />
    <meta name="twitter:image:alt" content="Vibe Forge — from a spark of an idea to a build-ready spec." />
    <!-- Optional: add your handle, e.g. <meta name="twitter:site" content="@yourhandle" /> -->

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html { background: #0e0f13; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
